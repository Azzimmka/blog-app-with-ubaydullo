{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-md py-12">
    <h1 class="mb-6 text-3xl font-bold">Регистрация</h1>

    <form action="" method="post" class="space-y-4">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label class="mb-2 block font-medium" for="{{ field.id_for_label }}">
                    {{ field.label }}
                </label>

                {{ field }}

                {% for error in field.errors %}
                    <p class="mt-1 text-sm text-red-600">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-3 text-white hover:bg-blue-700">
            Создать аккаунт
        </button>
    </form>

    <p class="mt-6 text-sm">
        Уже есть аккаунт?
        <a class="text-blue-600">Войти</a>
    </p>
</section>
{% endblock %}
